name: Actualizar Tracker Operativo

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests openpyxl --quiet

      - name: Actualizar facturacion (cierres de caja)
        env:
          MS_TENANT_ID:       ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:       ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET:   ${{ secrets.MS_CLIENT_SECRET }}
          ONEDRIVE_SHARE_URL: ${{ secrets.ONEDRIVE_SHARE_URL }}
        run: python update_facturacion.py

      - name: Generar tracker-operativo.html
        env:
          MS_TENANT_ID:       ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:       ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET:   ${{ secrets.MS_CLIENT_SECRET }}
          ONEDRIVE_SHARE_URL: ${{ secrets.ONEDRIVE_SHARE_URL }}
        run: python generar_tracker.py

      - name: Preparar carpeta deploy
        run: |
          mkdir -p Netfily
          cp tracker-operativo.html Netfily/tracker-operativo.html

      - name: Deploy a Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID:    ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install -g netlify-cli --silent
          netlify deploy --prod \
            --auth    "$NETLIFY_AUTH_TOKEN" \
            --site    "$NETLIFY_SITE_ID"   \
            --dir     Netfily              \
            --message "Auto-update $(date +'%d/%m/%Y %H:%M')"
